name: Build and Deploy

on:
  push:
    paths:
      - "srcpkgs/**"
    branches:
      - main

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              arch: x86_64,
              host: x86_64,
              libc: glibc,
              platform: linux/amd64,
            }
          # - { arch: i686,         host: i686,        libc: glibc, platform: linux/386 }
          # - { arch: aarch64,      host: x86_64,      libc: glibc, platform: linux/amd64 }
          # - { arch: armv7l,       host: x86_64,      libc: glibc, platform: linux/amd64 }
          # - { arch: x86_64-musl,  host: x86_64-musl, libc: musl,  platform: linux/amd64 }
          # - { arch: armv6l-musl,  host: x86_64-musl, libc: musl,  platform: linux/amd64 }
          # - { arch: aarch64-musl, host: x86_64-musl, libc: musl,  platform: linux/amd64 }

    container:
      image: ghcr.io/void-linux/void-${{ matrix.config.libc }}-full:latest
      options: --platform ${{ matrix.config.platform }} --privileged
      volumes:
        - /dev:/dev
      env:
        ARCH: "${{ matrix.config.arch }}"
        BOOTSTRAP: "${{ matrix.config.host }}"

    steps:
      - name: Prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Syu xbps && xbps-install -yu && xbps-install -y sudo bash curl git
          useradd -G xbuilder -M builder

      - name: Checkout upstream templates
        uses: actions/checkout@v4
        with:
          repository: void-linux/void-packages
          ref: master
          fetch-depth: 1

      - name: Checkout local templates
        uses: actions/checkout@v4
        with:
          path: added-packages

      - name: Copy templates
        run: cp -rv added-packages/srcpkgs/* srcpkgs

      - name: Prepare masterdir
        run: |
          chown -R builder:builder . &&
          sudo -Eu builder common/travis/set_mirror.sh &&
          sudo -Eu builder common/travis/prepare.sh &&
          common/travis/fetch-xtools.sh

      - name: Detect changed packages
        id: detect
        run: |
          .github/changed_templates.sh
          echo "packages=$(cat detected_templates | tr '\n' ' ')" >> $GITHUB_OUTPUT
          echo "--- Changed packages ---"
          cat detected_templates

      - name: Build packages
        run: sudo -Eu builder common/travis/build.sh "$BOOTSTRAP" "$ARCH"

      - name: Archive xbps artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.config.arch }}-${{ matrix.config.libc }}.xbps
          path: hostdir/binpkgs/*.xbps

  deploy:
    name: Deploy repository
    runs-on: ubuntu-latest
    needs: [build]
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-deployment
      cancel-in-progress: false

    steps:
      - name: Prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Syu xbps && xbps-install -yu && xbps-install -y sudo bash curl git git-lfs

      - name: Checkout existing repo
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          lfs: true

      - name: Remove existing packages
        run: xbps-rindex --remove $PWD

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true

      - name: Sign packages
        run: |
          echo "${{ secrets.PRIV_KEY }}" > $HOME/privkey
          xbps-rindex -s --signedby "${{ secrets.SIGNER }}" --privkey $HOME/privkey $PWD
          xbps-rindex -S --privkey $HOME/privkey $PWD/*.xbps
          rm $HOME/privkey

      - name: Add packages to repo
        run: |
          xbps-rindex --add $PWD/*.xbps
          xbps-rindex --clean $PWD
          xbps-rindex --remove $PWD

      - name: Commit repo state
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          file_pattern: "*.xbps *.xbps.sig2"
          commit_message: "Update package repo"

      - name: Create index page
        run: |
          echo '<html><head><title>Custom void repository</title></head> <body><h1>Custom void repository. Index of /</h1><hr><pre>' > index.html
          for pkg in *.xbps *.xbps.sig2; do echo "<a href=\"${pkg}\">${pkg}</a>" >> index.html; done
          echo '</body></html>' >> index.html

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
