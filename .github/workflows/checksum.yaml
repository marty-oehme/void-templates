name: Checksum Update

on:
  pull_request:
    paths:
      - "srcpkgs/**"
    types:
      - opened
      - synchronize
    branches:
      - main

jobs:
  checksum:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'renovate/')
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --platform linux/amd64 --privileged
      volumes:
        - /dev:/dev
      env:
        ARCH: x86_64
        BOOTSTRAP: x86_64

    steps:
      - name: Prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Suy xbps && xbps-install -Suy sudo xtools bash git
          useradd -G xbuilder -M builder

      - name: Checkout local templates
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Detect changed packages
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            srcpkgs/*/template

      - name: Extract package names
        id: detect
        run: |
          mkdir -p /tmp/changed-pkgs
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "$file"
          done | cut -d/ -f2 | sort -u > /tmp/changed-pkgs/packages.txt
          echo "--- Detected packages ---"
          cat /tmp/changed-pkgs/packages.txt

      - name: Checkout upstream templates
        uses: actions/checkout@v4
        with:
          repository: void-linux/void-packages
          ref: master
          fetch-depth: 1
          path: upstream

      - name: Prepare masterdir
        working-directory: upstream
        run: |
          chown -R builder:builder . &&
          sudo -Eu builder common/travis/set_mirror.sh &&
          sudo -Eu builder common/travis/prepare.sh

      - name: Copy templates to upstream
        run: cp -av srcpkgs/. upstream/srcpkgs/

      - name: Generate checksums
        working-directory: upstream
        run: |
          sudo -Eu builder xgensum -f -i $(cat /tmp/changed-pkgs/packages.txt | tr '\n' ' ')

      - name: Copy updated templates back
        run: |
          for pkg in $(cat /tmp/changed-pkgs/packages.txt); do
            cp -r "upstream/srcpkgs/$pkg" srcpkgs/
          done

      - name: Commit checksum updates
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add srcpkgs/*/template
          if git diff --staged --quiet; then
            echo "No checksum changes detected"
          else
            git commit -m "Update checksums"
            git push
          fi
